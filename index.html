<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kočičí věštírna</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <div class="window">
      <header class="title-card">
        <h1>Kočičí věštírna</h1>
        <p>Stiskni tlačítko a nechej kočku věštit.</p>
      </header>

      <section class="oracle-card">
        <img src="Copilot_20260622_112137.png" alt="Copilot" class="cat-face">

        <div class="fortune-box" id="fortuneBox">
          <p class="fortune-text">Kočka poslouchá... stiskni tlačítko.</p>
        </div>

        <button id="fortuneButton" class="fortune-button">Získat věštbu</button>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
